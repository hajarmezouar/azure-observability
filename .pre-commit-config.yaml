repos:

# --------------------------------------------------
# Generic hooks
# --------------------------------------------------

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-yaml
    - id: check-added-large-files

# --------------------------------------------------
# Terraform
# --------------------------------------------------

- repo: local
  hooks:

    - id: terraform-fmt
      name: Terraform Format
      language: system
      entry: bash -c "cd terraform && terraform fmt -recursive"
      pass_filenames: false

    - id: terraform-tflint
      name: Terraform TFLint
      language: system
      entry: bash -c "cd terraform && tflint"
      pass_filenames: false
