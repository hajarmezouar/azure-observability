name: Terraform CI

on:
  pull_request:
    branches:
      - "**"

  push:
    branches:
      - "**"

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

env:
  TF_WORKING_DIR: terraform

jobs:

# ==========================================================
# Terraform Format
# ==========================================================

  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

# ==========================================================
# Terraform Validate
# ==========================================================

  validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    needs: fmt

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Cache Terraform directory
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Terraform Init (local only)
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate

# ==========================================================
# Terraform TFLint
# ==========================================================

  lint:
    name: Terraform TFLint
    runs-on: ubuntu-latest

    needs: validate

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint

# ==========================================================
# Terraform Checkov
# ==========================================================

  checkov:
    name: Terraform Checkov
    runs-on: ubuntu-latest

    needs: lint

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          output_format: sarif
          output_file_path: reports/results.sarif
          quiet: true

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: reports/results.sarif

# ==========================================================
# Terraform Plan
# ==========================================================

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    needs: checkov

    # Dependabot has no Azure credentials
    if: github.actor != 'dependabot[bot]'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      TF_VAR_owner: ${{ vars.TF_VAR_OWNER }}
      TF_VAR_resource_group_name: ${{ vars.TF_VAR_RESOURCE_GROUP_NAME }}
      TF_VAR_app_service_plan_name: ${{ vars.TF_VAR_APP_SERVICE_PLAN_NAME }}
      TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
      TF_VAR_tags: ${{ vars.TF_VAR_TAGS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('terraform/.terraform.lock.hcl') }}

      - name: Configure Terraform plugin cache
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' > ~/.terraformrc

      - name: Make scripts executable
        run: chmod +x ../scripts/*.sh

      - name: Terraform Init (Remote Backend)
        run: ../scripts/terraform-init.sh

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/tfplan

# ==========================================================
# Infracost
# ==========================================================

  infracost:
    name: Infracost Estimate
    runs-on: ubuntu-latest

    needs: plan

    if: github.actor != 'dependabot[bot]'

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    env:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Install Infracost
        uses: infracost/actions/setup@v3

      - name: Generate Infracost JSON
        run: |
          infracost breakdown \
            --path tfplan \
            --format json \
            --out-file infracost.json

      - name: Generate Infracost HTML report
        run: |
          infracost output \
            --path infracost.json \
            --format html \
            --out-file infracost.html

      - name: Upload Infracost reports
        uses: actions/upload-artifact@v4
        with:
          name: infracost-report
          path: |
            terraform/infracost.json
            terraform/infracost.html

# ==========================================================
# Terraform Test
# ==========================================================

  tftest:
    name: Terraform Test
    runs-on: ubuntu-latest

    needs: validate

    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Run Terraform Tests
        run: terraform test